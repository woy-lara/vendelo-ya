/* Tipos de cita para el calendario y las etiquetas */
const CITA_TIPO = {
  revisado: { label: "Revisado",            cls: "rev" },
  cita:     { label: "Cita con el cliente", cls: "cita" },
  reunion:  { label: "Reunión",             cls: "reunion" }
};
const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const MESES_LARGO = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const WEEKDAYS = ["L","M","M","J","V","S","D"];

/* "24 jul" -> { day, month } (índice 0-11) */
function parseCitaFecha(str){
  if (!str) return null;
  const m = String(str).trim().toLowerCase().match(/(\d{1,2})\s+([a-zá]+)/);
  if (!m) return null;
  const mon = MESES.findIndex(x => m[2].startsWith(x));
  return mon < 0 ? null : { day: +m[1], month: mon };
}

/* Recordatorios de llamada derivados del estado de los autos */
function reminders(){
  const cars = vyCars();
  const list = [];
  cars.filter(c => c.stage === 6).forEach(c =>
    list.push({ car:c, reason:"Dar seguimiento a la oferta enviada" }));
  cars.filter(c => c.cita && c.stage === 4).forEach(c =>
    list.push({ car:c, reason:`Confirmar cita · ${c.cita.fecha}, ${c.cita.hora}` }));
  cars.filter(c => c.stage === 2).slice(0,1).forEach(c =>
    list.push({ car:c, reason:"Contactar para agendar el revisado" }));
  return list;
}

/* Feed de notificaciones (derivado del estado + un toque de conversación) */
function notifs(){
  const cars = vyCars();
  const items = [];
  cars.filter(c => c.stage <= 2).forEach(c =>
    items.push({ exp:c.id, cls:"", icon:"i-doc", owner:c, time:"Hoy", html:`<b>${esc(c.owner)}</b> publicó un ${esc(c.brand)} ${esc(c.model)}` }));
  cars.filter(c => c.stage === 6).forEach(c =>
    items.push({ exp:c.id, cls:"amber", icon:"i-chat", owner:c, time:"Hace 2 h", html:`Oferta enviada a <b>${esc(c.owner)}</b> — espera respuesta` }));
  cars.filter(c => c.stage >= 9).forEach(c =>
    items.push({ exp:c.id, cls:"green", icon:"i-check", time:"Ayer", html:`Compra cerrada: <b>${esc(c.brand)} ${esc(c.model)}</b>` }));
  cars.filter(c => c.cita && c.stage === 4).forEach(c =>
    items.push({ exp:c.id, cls:"", icon:"i-cal", owner:c, time:"Próxima", html:`Cita con <b>${esc(c.owner)}</b> el ${esc(c.cita.fecha)}` }));
  /* "respondió por WhatsApp" solo para autos que ya pasaron la oferta (etapa 7–8),
     así no contradice la notificación de "oferta enviada — espera respuesta" (etapa 6) */
  const conv = cars.find(c => c.stage >= 7 && c.stage < 9);
  if (conv) items.unshift({ exp:conv.id, cls:"amber", icon:"i-chat", owner:conv, time:"Hace 20 min", html:`<b>${esc(conv.owner)}</b> respondió por WhatsApp` });
  return items.slice(0, 6);
}

/* Estado del calendario: por defecto el mes con citas sembradas */
function defaultCalMonth(){
  const yr = new Date().getFullYear();
  for (const c of vyCars()){
    const p = parseCitaFecha(c.cita && c.cita.fecha);
    if (p) return { y: yr, m: p.month };
  }
  const t = new Date();
  return { y: t.getFullYear(), m: t.getMonth() };
}
let CAL = defaultCalMonth();

function buildCalendarCells(y, m){
  const startIdx = (new Date(y, m, 1).getDay() + 6) % 7; /* semana inicia lunes */
  const days = new Date(y, m + 1, 0).getDate();
  const nowY = new Date().getFullYear(); /* las citas no llevan año: solo se muestran en el año en curso */
  const byDay = {};
  if (y === nowY) vyCars().forEach(c => {
    if (!c.cita) return;
    const p = parseCitaFecha(c.cita.fecha);
    if (p && p.month === m) (byDay[p.day] = byDay[p.day] || []).push(c);
  });
  const rem = vyCalRem();
  const t = new Date();
  const isToday = d => t.getFullYear() === y && t.getMonth() === m && t.getDate() === d;
  let cells = "";
  /* sin celdas vacías: el día 1 se posiciona con grid-column-start (evita filas fantasma) */
  for (let d = 1; d <= days; d++){
    const evs = byDay[d] || [];
    const key = `${y}-${m}-${d}`;
    const rms = rem[key] || [];
    const startStyle = d === 1 && startIdx > 0 ? ` style="grid-column-start:${startIdx + 1}"` : "";
    cells += `<div class="cal-cell ${isToday(d) ? "today" : ""}" data-day="${key}" data-dnum="${d}"${startStyle}>
      <span class="cd-row"><span class="cd">${d}</span><span class="cd-add">+</span></span>
      ${evs.map(c => {
        const tp = CITA_TIPO[c.cita.tipo || "revisado"];
        return `<span class="cal-ev ${tp.cls}" data-exp="${c.id}" title="${esc(tp.label)} · ${esc(c.owner)} · ${esc(c.cita.hora)}">${esc(c.owner)}</span>`;
      }).join("")}
      ${rms.map(r => `<span class="cal-ev rem" title="${esc(r.text)}">${esc(r.text)}</span>`).join("")}
    </div>`;
  }
  return cells;
}

/* Gráfica + tabla de inversión y ganancia de los autos comprados */
function dashChart(){
  const comprados = vyCars().filter(c => c.showroom);
  if (!comprados.length) return "";
  const vendidos = comprados.filter(c => c.sold);
  const gastoDe = c => (c.tasks || []).filter(t => t.done).reduce((s, t) => s + (+t.cost || 0), 0);
  const ganDe = c => c.soldPrice - (c.invest || 0) - gastoDe(c);
  const totalInv = comprados.reduce((s, c) => s + (c.invest || 0), 0);
  const totalVenta = vendidos.reduce((s, c) => s + (c.soldPrice || 0), 0);
  const totalGan = vendidos.reduce((s, c) => s + ganDe(c), 0);
  const maxV = Math.max(...comprados.map(c => Math.max(c.invest || 0, c.soldPrice || 0)), 1);
  return `
    <div class="panel-card" style="margin-top:18px">
      <h3><svg class="ic"><use href="#i-star"/></svg>Inversión y ganancias · autos comprados</h3>
      <div class="kpis">
        <div class="kpi"><span>Total invertido</span><b>${money(totalInv)}</b></div>
        <div class="kpi"><span>Total en ventas</span><b>${money(totalVenta)}</b></div>
        <div class="kpi hl"><span>Ganancia total</span><b>${money(totalGan)}</b></div>
        <div class="kpi"><span>Autos vendidos</span><b>${vendidos.length}/${comprados.length}</b></div>
      </div>
      <div class="chart-legend">
        <span><i style="background:var(--ink)"></i>Inversión</span>
        <span><i style="background:var(--ok)"></i>Venta</span>
        <span><i style="background:var(--line);border:1px solid var(--line)"></i>Ganancia</span>
      </div>
      <div class="chart">
        ${comprados.map(c => {
          const inv = c.invest || 0, ven = c.sold ? c.soldPrice : 0, gan = c.sold ? ganDe(c) : 0;
          return `
          <div class="chart-row">
            <div class="chart-label">${esc(c.brand)} ${esc(c.model)}<small>${c.year}</small></div>
            <div class="chart-bars">
              <div class="bar-track"><span class="bar bar-inv" style="width:${inv / maxV * 100}%"></span><em>${money(inv)}</em></div>
              ${c.sold
                ? `<div class="bar-track"><span class="bar bar-ven" style="width:${ven / maxV * 100}%"></span><em>${money(ven)} <b class="gan">+${money(gan)}</b></em></div>`
                : `<div class="bar-track"><span class="chart-proc">En reacondicionamiento</span></div>`}
            </div>
          </div>`;
        }).join("")}
      </div>
      <div class="chart-table-wrap">
        <table class="chart-table">
          <thead><tr><th>Auto</th><th>Inversión</th><th>Mejoras</th><th>Venta</th><th>Ganancia</th></tr></thead>
          <tbody>
            ${comprados.map(c => `
              <tr>
                <td>${esc(c.brand)} ${esc(c.model)} <span class="ct-y">${c.year}</span></td>
                <td>${money(c.invest || 0)}</td>
                <td>${money(gastoDe(c))}</td>
                <td>${c.sold ? money(c.soldPrice) : "—"}</td>
                <td>${c.sold ? `<b class="gan">+${money(ganDe(c))}</b>` : '<span class="ct-proc">En proceso</span>'}</td>
              </tr>`).join("")}
            <tr class="ct-total"><td>Totales</td><td>${money(totalInv)}</td><td>${money(comprados.reduce((s,c)=>s+gastoDe(c),0))}</td><td>${money(totalVenta)}</td><td><b class="gan">+${money(totalGan)}</b></td></tr>
          </tbody>
        </table>
      </div>
    </div>`;
}

const FUEL_ES = { G: "Gasolina", D: "Diésel", H: "Híbrido", E: "Eléctrico" };
const BODY_ES = { S: "Sedán", H: "Hatchback", U: "SUV / Crossover", P: "Pickup", C: "Coupé", V: "Van" };

function applyFilters(cars){
  const f = FIL;
  let out = cars.filter(c =>
    (f.etapa === "todos" ||
      (f.etapa === "nuevos" && c.stage <= 2) ||
      (f.etapa === "proceso" && c.stage >= 3 && c.stage <= 8) ||
      (f.etapa === "cerrados" && c.stage >= 9)) &&
    (!f.disp || c.disp) &&
    (!f.marcas.size || f.marcas.has(c.brand)) &&
    (!f.bodies.size || f.bodies.has(c.body || "S")) &&
    (!f.fuels.size || f.fuels.has(c.fuel)) &&
    (!f.trans || c.trans === f.trans) &&
    (f.pmin === "" || c.price >= +f.pmin) &&
    (f.pmax === "" || c.price <= +f.pmax));
  const s = f.sort;
  out.sort((a,b) =>
    s === "pmayor" ? b.price - a.price :
    s === "pmenor" ? a.price - b.price :
    s === "anio" ? b.year - a.year :
    b.created - a.created);
  return out;
}

/* Histograma de precios: 20 cubetas entre 0 y el máximo */
function priceHist(all){
  const max = Math.max(...all.map(c => c.price), 1000);
  const top = Math.ceil(max / 1000) * 1000;
  const N = 20, buckets = Array(N).fill(0);
  all.forEach(c => buckets[Math.min(N - 1, Math.floor(c.price / top * N))]++);
  const hmax = Math.max(...buckets, 1);
  return { top, buckets, hmax };
}

          </div>
        </div>
        <div class="fgroup">

          ${(() => {
            const { top, buckets, hmax } = priceHist(all);
            const lo = f.pmin === "" ? 0 : +f.pmin;
            const hi = f.pmax === "" ? top : +f.pmax;
            return `
            <div class="hist" id="hist" data-top="${top}">
              ${buckets.map((b, i) => {
                const b0 = i / buckets.length * top, b1 = (i + 1) / buckets.length * top;
                const on = b1 >= lo && b0 <= hi;
                return `<i class="${on ? "on" : ""}" style="height:${Math.max(6, b / hmax * 100)}%"></i>`;
              }).join("")}
            </div>
            <div class="dual">
              <span class="fill" id="dualFill" style="left:${lo/top*100}%; right:${100 - hi/top*100}%"></span>
              <input type="range" id="rMin" min="0" max="${top}" step="100" value="${lo}">
              <input type="range" id="rMax" min="0" max="${top}" step="100" value="${hi}">
            </div>
            <div class="fprice">
              <label><span>Desde</span><input id="fPmin" type="number" placeholder="0" value="${f.pmin === "" ? "" : lo}"></label>
              <label><span>Hasta</span><input id="fPmax" type="number" placeholder="${top.toLocaleString("en-US")}" value="${f.pmax === "" ? "" : hi}"></label>

        <div class="fgroup">

              <span class="cnt">${all.filter(c => c.fuel === k).length}</span></label>`).join("")}
        </div>
      </aside>
      <div>
        <div class="cat-head">
          <h2 class="disp"><b>${cars.length}</b> ${cars.length === 1 ? "auto publicado" : "autos publicados"}</h2>
          <select class="sel-sm" id="fSort">

/* Solo se aceptan dataURL de imagen (base64, sin comillas) — evita inyección en CSS/atributos */
const isImgData = s => typeof s === "string" && /^data:image\/(png|jpe?g|gif|webp|avif);base64,[a-z0-9+/=]+$/i.test(s);
/* Solo colores hex válidos — evita romper el atributo style con texto arbitrario */
const safeHex = (c, fb) => (/^#[0-9a-f]{3,8}$/i.test((c || "").trim()) ? c.trim() : fb);
function tallerBannerStyle(t){
  if (isImgData(t.banner)) return `background-image:url("${t.banner}"); background-size:cover; background-position:center`;
  const parts = (t.banner || "#1F2937,#4B5563").split(",");
  return `background:linear-gradient(135deg, ${safeHex(parts[0], "#1F2937")}, ${safeHex(parts[1], "#4B5563")})`;
}
function tallerLogoHtml(t){
  if (isImgData(t.logo)) return `<img src="${t.logo}" alt="">`;
  return esc(t.logo || (t.nombre || "T").slice(0, 2).toUpperCase());
}
function tallerFull(t){ return `${t.nombre}, ${t.zona}`; }

/* Abre un documento (dataURL) en una pestaña nueva vía Blob (evita bloqueos con dataURLs grandes) */
function openDoc(d){
  try {
    const parts = (d.data || "").split(",");
    const bin = atob(parts[1] || "");
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    const blob = new Blob([arr], { type: d.mime || (d.type === "pdf" ? "application/pdf" : "image/png") });
    const url = URL.createObjectURL(blob);
    const w = window.open(url, "_blank", "noopener");
    setTimeout(() => URL.revokeObjectURL(url), 60000);
    if (!w) location.href = url;
  } catch(e){ alert("No se pudo abrir el documento."); }
}

/* Pop-up centrado con el expediente del auto (misma vista que en Solicitudes),
   abierto desde el historial de revisados del taller */
function mountExpModal(){
  const old = document.getElementById("expModal");
  if (old) old.remove();
  if (!EXP_MODAL){ document.body.style.overflow = ""; return; }
  const c = vyCars().find(x => x.id === EXP_MODAL);
  if (!c){ EXP_MODAL = null; return; }
  const ov = document.createElement("div");
  ov.className = "lb-overlay open exp-modal";
  ov.id = "expModal";
  ov.innerHTML = `
    <div class="lb-card exp-modal-card">
      <button class="lb-close" data-expclose aria-label="Cerrar"><svg class="ic"><use href="#i-x"/></svg></button>
      <div class="exp-modal-body">${vExp(EXP_MODAL)}</div>
    </div>`;
  document.body.appendChild(ov);
  document.body.style.overflow = "hidden";
  const close = () => { EXP_MODAL = null; document.body.style.overflow = ""; ov.remove(); };
  ov.addEventListener("click", e => { if (e.target === ov || e.target.closest("[data-expclose]")) close(); });
}

/* ---------- Recordatorio de un día del calendario ---------- */
function openReminderModal(key, dnum){
  const [y, m] = key.split("-").map(Number);
  const rem = vyCalRem();
  const list = rem[key] || [];
  const ov = document.createElement("div");
  ov.className = "lb-overlay open";
  ov.innerHTML = `
    <div class="lb-card">
      <button class="lb-close" data-close aria-label="Cerrar"><svg class="ic"><use href="#i-x"/></svg></button>
      <div class="lb-head">
        <span class="lb-ic" style="background:var(--blue-soft);color:var(--blue)"><svg class="ic"><use href="#i-bell"/></svg></span>
        <div><b>${dnum} de ${MESES_LARGO[m]} ${y}</b><small>Recordatorios y notas del día</small></div>
      </div>
      <div class="rem-list">
        ${list.length ? list.map((r, i) => `
          <div class="rem-item"><span>${esc(r.text)}</span>
            <button class="rem-del" data-del="${i}" aria-label="Eliminar"><svg class="ic"><use href="#i-x"/></svg></button></div>`).join("")
          : '<p class="co-empty">Sin recordatorios para este día.</p>'}
      </div>
      <div class="field" style="margin-top:14px">
        <label>Nuevo recordatorio</label>
        <input id="remInput" type="text" placeholder="Ej. Llamar a José por la contraoferta">
      </div>
      <div class="lb-actions">
        <button class="btn btn-ghost btn-sm" data-close>Cerrar</button>
        <button class="btn btn-blue btn-sm" id="remAdd" style="flex:1">Guardar recordatorio</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  document.body.style.overflow = "hidden";
  const close = () => { ov.remove(); document.body.style.overflow = ""; render(); };
  ov.addEventListener("click", e => { if (e.target === ov || e.target.closest("[data-close]")) close(); });
  ov.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", () => {
    vyDelCalRem(key, +b.dataset.del); ov.remove(); document.body.style.overflow = ""; openReminderModal(key, dnum);
  }));
  const input = ov.querySelector("#remInput");
  const add = () => {
    const text = input.value.trim();
    if (!text) return;
    vyAddCalRem(key, { text });
    ov.remove(); document.body.style.overflow = ""; openReminderModal(key, dnum);
  };
  ov.querySelector("#remAdd").addEventListener("click", add);
  input.addEventListener("keydown", e => { if (e.key === "Enter") add(); });
  setTimeout(() => input.focus(), 50);
}

/* ---------- Lightbox: enviar contraoferta por WhatsApp ---------- */
function waMessage(car, monto){
  const nombre = (car.owner || "").trim().split(/\s+/)[0] || "estimado(a)";
  return `Hola ${nombre}, le saluda ${ADMIN.name} de Véndelo Ya. `
    + `Gracias por publicar su ${car.brand} ${car.model} ${car.year} con nosotros. `
    + `Revisamos con cuidado la información que nos compartió y con gusto le presentamos una contraoferta de ${vyMoney(monto)} por su vehículo. `
    + `Si está de acuerdo o desea conversar los siguientes pasos (revisado y traspaso legal), quedamos completamente a su disposición. `
    + `¡Un cordial saludo!`;
}
function waHref(phone, text){
  return `https://wa.me/${String(phone || "").replace(/[^\d]/g, "")}?text=${encodeURIComponent(text)}`;
}
function openWhatsappModal(car, monto){
  if (!car) return;
  const lb = document.getElementById("waLb");
  const card = document.getElementById("waCard");
  const msg = waMessage(car, monto);
  card.innerHTML = `
    <button class="lb-close" id="waClose" aria-label="Cerrar"><svg class="ic"><use href="#i-x"/></svg></button>
    <div class="lb-head">
      <span class="lb-ic"><svg class="ic"><use href="#i-wa"/></svg></span>
      <div><b>Enviar contraoferta por WhatsApp</b><small>Se abrirá WhatsApp con el mensaje listo para enviar</small></div>
    </div>
    <div class="lb-contact">
      <span class="lb-av">${vyInitials(car.owner)}</span>
      <div class="lb-who"><b>${esc(car.owner || "Cliente")}</b><small>${esc(car.ownerPhone || "")}</small></div>
      <span class="lb-amt">${money(monto)}</span>
    </div>
    <label class="lb-label">Mensaje</label>
    <textarea id="waMsg" rows="7">${esc(msg)}</textarea>
    <div class="lb-actions">
      <button class="btn btn-ghost btn-sm" id="waCancel">Cancelar</button>
      <a class="btn btn-wa btn-sm" id="waSend" href="${waHref(car.ownerPhone, msg)}" target="_blank" rel="noopener">
        <svg class="ic"><use href="#i-wa"/></svg>Abrir WhatsApp</a>
    </div>`;
  lb.classList.add("open");
  lb.setAttribute("aria-hidden", "false");
  const close = () => { lb.classList.remove("open"); lb.setAttribute("aria-hidden", "true"); };
  document.getElementById("waClose").onclick = close;
  document.getElementById("waCancel").onclick = close;
  lb.onclick = e => { if (e.target === lb) close(); };
  const msgEl = document.getElementById("waMsg");
  msgEl.addEventListener("input", () => {
    document.getElementById("waSend").href = waHref(car.ownerPhone, msgEl.value);
  });
}

function bindShowroom(){
  const h = location.hash;
  if (!h.startsWith("#showroom=")) return;
  const id = h.slice(10);
  const carOr = () => vyCars().find(x => x.id === id);
  document.querySelectorAll("[data-task]").forEach(el => el.addEventListener("click", () => {
    const c = carOr(); if (!c) return;
    const tasks = (c.tasks || []).slice(); const i = +el.dataset.task;
    tasks[i] = Object.assign({}, tasks[i], { done: !tasks[i].done });
    vyUpdateCar(id, { tasks }); render();
  }));
  document.querySelectorAll("[data-taskdel]").forEach(el => el.addEventListener("click", () => {
    const c = carOr(); if (!c) return;
    const tasks = (c.tasks || []).slice(); tasks.splice(+el.dataset.taskdel, 1);
    vyUpdateCar(id, { tasks }); render();
  }));
  const ta = document.getElementById("taskAdd");
  if (ta) ta.addEventListener("click", () => {
    const c = carOr(); if (!c) return;
    const t = document.getElementById("taskInput").value.trim();
    if (!t){ alert("Escribe la tarea de mejora."); return; }
    const cost = +document.getElementById("taskCost").value || 0;
    const tasks = (c.tasks || []).slice(); tasks.push({ t, cost, done: false });
    vyUpdateCar(id, { tasks }); render();
  });
  const sell = document.getElementById("srSell");
  if (sell) sell.addEventListener("click", () => {
    const c = carOr(); if (!c) return;
    const p = +document.getElementById("srSold").value;
    if (!p || p <= 0){ alert("Ingresa el precio de venta final."); return; }
    const dt = new Date();
    vyUpdateCar(id, { sold: true, soldPrice: p, soldDate: `${dt.getDate()} ${MESES[dt.getMonth()]}` });
    render();
  });
  const rep = document.getElementById("srReport");
  if (rep) rep.addEventListener("click", () => alert("Demo: aquí se abriría el PDF del informe del taller con los detalles a mejorar."));
}

function bindTaller(){
  const h = location.hash;
  if (!h.startsWith("#taller=")) return;
  const id = h.slice(8);
  const save = document.getElementById("teSave");
  if (save) save.addEventListener("click", () => {
    const ts = vyTalleres(); const t = ts.find(x => x.id === id); if (!t) return;
    t.nombre = document.getElementById("teNom").value.trim() || t.nombre;
    t.zona = document.getElementById("teZona").value.trim();
    t.phone = document.getElementById("teTel").value.trim();
    t.contacto = document.getElementById("teCon").value.trim();
    t.email = document.getElementById("teMail").value.trim();
    vySaveTalleres(ts); render();
  });
  const del = document.getElementById("teDel");
  if (del) del.addEventListener("click", () => {
    if (!confirm("¿Quitar este taller?")) return;
    vySaveTalleres(vyTalleres().filter(x => x.id !== id)); location.hash = "#talleres";
  });
  const readImg = (input, field) => {
    const f = input.files && input.files[0]; if (!f) return;
    /* solo imágenes rasterizadas y hasta 4 MB (evita SVG con scripts y archivos enormes) */
    if (!/^image\/(png|jpe?g|gif|webp|avif)$/i.test(f.type)){ alert("Sube una imagen válida (PNG, JPG, GIF o WebP)."); input.value = ""; return; }
    if (f.size > 4 * 1024 * 1024){ alert("La imagen supera 4 MB. Usa una más liviana."); input.value = ""; return; }
    const r = new FileReader();
    r.onload = () => {
      if (!isImgData(r.result)){ alert("No se pudo leer la imagen."); return; }
      const ts = vyTalleres(); const t = ts.find(x => x.id === id);
      if (t){ t[field] = r.result; vySaveTalleres(ts); render(); }
    };
    r.readAsDataURL(f);
  };
  const bn = document.getElementById("tBannerUp"); if (bn) bn.addEventListener("change", () => readImg(bn, "banner"));
  const lg = document.getElementById("tLogoUp"); if (lg) lg.addEventListener("change", () => readImg(lg, "logo"));
}

/* Gestión de clientes: crear, editar (propaga a sus autos) y eliminar */
function bindUsuarios(){
  const add = document.getElementById("nuAdd");
  if (add) add.addEventListener("click", () => {
    const name = document.getElementById("nuName").value.trim();
    const email = document.getElementById("nuMail").value.trim();
    const phone = document.getElementById("nuPhone").value.trim();
    if (!name){ alert("El nombre del cliente es obligatorio."); return; }
    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ alert("El correo no tiene un formato válido."); return; }
    vyUpsertUser({ name, email, phone, provider: "manual" });
    render();
  });
  document.querySelectorAll("[data-usave]").forEach(el =>
    el.addEventListener("click", () => {
      const uid = el.dataset.usave;
      const g = k => { const e = document.getElementById(k + uid); return e ? e.value.trim() : ""; };
      const name = g("us_name_"), phone = g("us_phone_"), email = g("us_email_");
      if (!name){ alert("El nombre no puede quedar vacío."); return; }
      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ alert("El correo no tiene un formato válido."); return; }
      const list = vyUsers(); const u = list.find(x => x.id === uid);
      if (!u){ render(); return; }
      u.name = name; u.phone = phone; u.email = email; vySaveUsers(list);
      /* propaga a los autos del cliente y a la sesión si es el usuario en curso */
      const cars = vyCars(); let ch = false;
      cars.forEach(c => { if (c.ownerId === uid){ c.owner = name; c.ownerPhone = phone; c.ownerEmail = email; ch = true; } });
      if (ch) vySaveCars(cars);
      render();
    }));
  document.querySelectorAll("[data-udel]").forEach(el =>
    el.addEventListener("click", () => {
      const uid = el.dataset.udel;
      const nCars = vyCars().filter(c => c.ownerId === uid).length;
      const msg = nCars
        ? `Este cliente tiene ${nCars} auto(s). Se eliminará su ficha pero los autos se conservan. ¿Continuar?`
        : "¿Eliminar este cliente?";
      if (!confirm(msg)) return;
      vySaveUsers(vyUsers().filter(u => u.id !== uid));
      render();
    }));
}

function bind(){
  document.querySelectorAll("[data-exp]").forEach(el =>
    el.addEventListener("click", () => location.hash = "#exp=" + el.dataset.exp));
  document.querySelectorAll("[data-expmodal]").forEach(el =>
    el.addEventListener("click", () => { EXP_MODAL = el.dataset.expmodal; render(); }));
  document.querySelectorAll("[data-showroom]").forEach(el =>
    el.addEventListener("click", () => location.hash = "#showroom=" + el.dataset.showroom));
  document.querySelectorAll("[data-taller]").forEach(el =>
    el.addEventListener("click", () => location.hash = "#taller=" + el.dataset.taller));

  bindShowroom();
  bindTaller();
  bindPerfil();
  bindUsuarios();

  /* filtros del catálogo */
  document.querySelectorAll("[data-fetapa]").forEach(el =>
    el.addEventListener("click", () => { FIL.etapa = el.dataset.fetapa; render(); }));
  document.querySelectorAll("[data-ftrans]").forEach(el =>
    el.addEventListener("click", () => { FIL.trans = el.dataset.ftrans; render(); }));
  document.querySelectorAll("[data-fmarca]").forEach(el =>
    el.addEventListener("change", () => {
      el.checked ? FIL.marcas.add(el.dataset.fmarca) : FIL.marcas.delete(el.dataset.fmarca);
      render();
    }));
  document.querySelectorAll("[data-ffuel]").forEach(el =>
    el.addEventListener("change", () => {
      el.checked ? FIL.fuels.add(el.dataset.ffuel) : FIL.fuels.delete(el.dataset.ffuel);
      render();
    }));
  const fd = document.getElementById("fDisp");
  if (fd) fd.addEventListener("click", () => { FIL.disp = !FIL.disp; render(); });
  document.querySelectorAll("[data-fbody]").forEach(el =>
    el.addEventListener("change", () => {
      el.checked ? FIL.bodies.add(el.dataset.fbody) : FIL.bodies.delete(el.dataset.fbody);
      render();
    }));

  /* doble slider de precio: arrastre en vivo, filtro al soltar */
  const rMin = document.getElementById("rMin"), rMax = document.getElementById("rMax");
  if (rMin && rMax){
    const top = +document.getElementById("hist").dataset.top;
    const live = () => {
      let lo = Math.min(+rMin.value, +rMax.value);
      let hi = Math.max(+rMin.value, +rMax.value);
      const fill = document.getElementById("dualFill");
      fill.style.left = (lo / top * 100) + "%";
      fill.style.right = (100 - hi / top * 100) + "%";
      document.getElementById("fPmin").value = lo;
      document.getElementById("fPmax").value = hi;
      [...document.getElementById("hist").children].forEach((bar, i, arr) => {
        const b0 = i / arr.length * top, b1 = (i + 1) / arr.length * top;
        bar.classList.toggle("on", b1 >= lo && b0 <= hi);
      });
      return { lo, hi };
    };
    const commit = () => {
      const { lo, hi } = live();
      FIL.pmin = lo === 0 ? "" : String(lo);
      FIL.pmax = hi >= top ? "" : String(hi);
      render();
    };
    [rMin, rMax].forEach(r => { r.addEventListener("input", live); r.addEventListener("change", commit); });
  }
  const pmin = document.getElementById("fPmin");
  if (pmin) pmin.addEventListener("change", () => { FIL.pmin = pmin.value; render(); });
  const pmax = document.getElementById("fPmax");
  if (pmax) pmax.addEventListener("change", () => { FIL.pmax = pmax.value; render(); });
  const srt = document.getElementById("fSort");
  if (srt) srt.addEventListener("change", () => { FIL.sort = srt.value; render(); });
  const frs = document.getElementById("filReset");
  if (frs) frs.addEventListener("click", () => {
    FIL.etapa = "todos"; FIL.marcas.clear(); FIL.bodies.clear(); FIL.fuels.clear();
    FIL.trans = ""; FIL.pmin = ""; FIL.pmax = ""; FIL.sort = "reciente"; FIL.disp = false;
    render();
  });

  const id = location.hash.startsWith("#exp=") ? location.hash.slice(5) : (EXP_MODAL || null);
  if (id){
    /* el auto pudo haberse eliminado en otra pestaña entre el render y el clic */
    const carOr = () => vyCars().find(x => x.id === id);

    document.querySelectorAll("[data-ck]").forEach(el =>
      el.addEventListener("click", () => {
        const c = carOr();
        if (!c){ render(); return; }
        const ck = Object.assign({}, c.checklist);
        ck[el.dataset.ck] = !ck[el.dataset.ck];
        vyUpdateCar(id, { checklist: ck });
        render();
      }));

    const nx = document.getElementById("stNext");
    if (nx) nx.addEventListener("click", () => {
      const c = carOr();
      if (!c){ render(); return; }
      if (c.stage < 9) vyUpdateCar(id, { stage: c.stage + 1 });
      render();
    });
    const bk = document.getElementById("stBack");
    if (bk) bk.addEventListener("click", () => {
      const c = carOr();
      if (!c){ render(); return; }
      if (c.stage > 1) vyUpdateCar(id, { stage: c.stage - 1 });
      render();
    });

    const cs = document.getElementById("cSave");
    if (cs) cs.addEventListener("click", () => {
      const fecha = document.getElementById("cFecha").value.trim();
      const hora = document.getElementById("cHora").value.trim();
      const tipo = document.getElementById("cTipo").value;
      const taller = document.getElementById("cTaller").value;
      if (!fecha || !hora || !taller){ alert("Completa fecha, hora y taller/lugar."); return; }
      const c = carOr();
      if (!c){ render(); return; }
      vyUpdateCar(id, { cita: { fecha, hora, tipo, taller }, stage: Math.max(c.stage, 4) });
      render();
    });

    const os = document.getElementById("oSave");
    if (os) os.addEventListener("click", () => {
      const c = carOr();
      if (!c){ render(); return; }
      const reporte = document.getElementById("oRes").value === "ok";
      vyUpdateCar(id, { reporte, stage: reporte ? Math.max(c.stage, 5) : c.stage });
      render();
    });

    /* Contraoferta: la empresa la propone; se guarda en el historial con el nombre del vendedor */
    const co = document.getElementById("coSave");
    if (co) co.addEventListener("click", () => {
      const c = carOr();
      if (!c){ render(); return; }
      const monto = +document.getElementById("coMonto").value;
      if (!monto || monto <= 0){ alert("Ingresa el monto de la contraoferta."); return; }
      const hist = (c.contraofertas || []).slice();
      const dt = new Date();
      const hh = dt.getHours(), h12 = ((hh + 11) % 12) + 1, ap = hh < 12 ? "a. m." : "p. m.";
      const fecha = `${dt.getDate()} ${MESES[dt.getMonth()]}, ${String(h12).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")} ${ap}`;
      hist.push({ monto, vendedor: c.owner || "Cliente", fecha });
      const updated = vyUpdateCar(id, { offer: monto, contraofertas: hist, stage: Math.max(c.stage, 6) });
      render();
      openWhatsappModal(updated, monto); /* guardar y enviar → abrir lightbox */
    });

    /* Editar / corregir todos los datos del auto y del propietario */
    const ed = document.getElementById("edSave");
    if (ed) ed.addEventListener("click", () => {
      const c = carOr();
      if (!c){ render(); return; }
      const val = k => { const e = document.getElementById(k); return e ? e.value : ""; };
      const num = k => { const n = parseInt(val(k), 10); return isNaN(n) ? 0 : n; };
      const chk = k => { const e = document.getElementById(k); return !!(e && e.checked); };
      const model = val("ed_model").trim();
      const year = num("ed_year");
      if (!model){ alert("El modelo no puede quedar vacío."); return; }
      if (year && (year < 1990 || year > 2027)){ alert("El año debe estar entre 1990 y 2027."); return; }
      const owner = val("ed_owner").trim() || c.owner;
      const ownerPhone = val("ed_ophone").trim();
      const ownerEmail = val("ed_omail").trim();
      vyUpdateCar(id, {
        brand: val("ed_brand"), model, year, km: num("ed_km"),
        trans: val("ed_trans"), fuel: val("ed_fuel"), body: val("ed_body"), color: val("ed_color"),
        price: num("ed_price"), photos: num("ed_photos"), videos: num("ed_videos"),
        disp: chk("ed_disp"), extras: val("ed_extras").trim(),
        accident: chk("ed_acc"), accidentDesc: val("ed_accDesc").trim(),
        debt: { has: chk("ed_debtHas"), bank: val("ed_bank").trim(), amount: num("ed_amount") },
        owner, ownerPhone, ownerEmail
      });
      /* coordina el cambio con la ficha del cliente si el auto está ligado */
      if (c.ownerId){
        const list = vyUsers(); const u = list.find(x => x.id === c.ownerId);
        if (u){ u.name = owner; u.phone = ownerPhone; u.email = ownerEmail; vySaveUsers(list); }
      }
      render();
    });

    /* Subir documento escaneado (PDF o imagen) */
    const dUp = document.getElementById("docUp");
    if (dUp) dUp.addEventListener("change", () => {
      const f = dUp.files && dUp.files[0]; if (!f) return;
      if (!/^(application\/pdf|image\/(png|jpe?g|webp|gif))$/i.test(f.type)){ alert("Sube un PDF o una imagen (PNG, JPG, WebP)."); dUp.value = ""; return; }
      if (f.size > 5 * 1024 * 1024){ alert("El archivo supera 5 MB. Usa uno más liviano o comprímelo."); dUp.value = ""; return; }
      const r = new FileReader();
      r.onload = () => {
        if (!isDocData(r.result)){ alert("No se pudo leer el archivo."); return; }
        const c = carOr(); if (!c){ render(); return; }
        const docs = (c.docs || []).slice();
        docs.push({ name: f.name, type: docKind(f.type), size: f.size, mime: f.type, data: r.result });
        try {
          if (!vyUpdateCar(id, { docs })) throw new Error("sin auto");
          render();
        } catch(e){
          alert("No se pudo guardar el documento (almacenamiento lleno). Elimina alguno o usa archivos más livianos.");
        }
      };
      r.readAsDataURL(f);
    });
    document.querySelectorAll("[data-docview]").forEach(el =>
      el.addEventListener("click", () => {
        const c = carOr(); if (!c || !c.docs) return;
        const d = c.docs[+el.dataset.docview]; if (d) openDoc(d);
      }));
    document.querySelectorAll("[data-docdel]").forEach(el =>
      el.addEventListener("click", () => {
        const c = carOr(); if (!c || !c.docs) return;
        if (!confirm("¿Eliminar este documento?")) return;
        const docs = c.docs.slice(); docs.splice(+el.dataset.docdel, 1);
        vyUpdateCar(id, { docs }); render();
      }));
  }

  const ta = document.getElementById("tAdd");
  if (ta) ta.addEventListener("click", () => {
    const nombre = document.getElementById("tNom").value.trim();
    const zona = document.getElementById("tZona").value.trim();
    if (!nombre || !zona){ alert("Completa nombre y zona."); return; }
    const ts = vyTalleres();
    ts.push({ id: "t" + Math.random().toString(36).slice(2,7), nombre, zona });
    vySaveTalleres(ts);
    render();
  });
  document.querySelectorAll("[data-delt]").forEach(el =>
    el.addEventListener("click", () => {
      vySaveTalleres(vyTalleres().filter(t => t.id !== el.dataset.delt));
      render();
    }));

  /* navegación del calendario */
  const cp = document.getElementById("calPrev");
  if (cp) cp.addEventListener("click", () => {
    CAL.m--; if (CAL.m < 0){ CAL.m = 11; CAL.y--; } render();
  });
  const cn = document.getElementById("calNext");
  if (cn) cn.addEventListener("click", () => {
    CAL.m++; if (CAL.m > 11){ CAL.m = 0; CAL.y++; } render();
  });
  /* clic en un día del calendario → crear recordatorio (si no se clickeó un evento) */
  document.querySelectorAll("[data-day]").forEach(cell =>
    cell.addEventListener("click", e => {
      if (e.target.closest("[data-exp]")) return;
      openReminderModal(cell.dataset.day, +cell.dataset.dnum);
    }));

  document.querySelectorAll(".side .nav").forEach(b =>
    b.addEventListener("click", () => location.hash = "#" + b.dataset.v));
}

/* Campana de notificaciones + menú de usuario: abrir/cerrar (una sola vez) */
function initTopbar(){
  const bell = document.getElementById("bellBtn");
  const menu = document.getElementById("notifMenu");
  const uBtn = document.getElementById("userBtn");
  const uMenu = document.getElementById("userMenu");
  bell.addEventListener("click", e => { e.stopPropagation(); uMenu.classList.remove("open"); menu.classList.toggle("open"); });
  uBtn.addEventListener("click", e => { e.stopPropagation(); menu.classList.remove("open"); uMenu.classList.toggle("open"); });
  document.addEventListener("click", e => {
    if (!menu.contains(e.target) && !bell.contains(e.target)) menu.classList.remove("open");
    if (!uMenu.contains(e.target) && !uBtn.contains(e.target)) uMenu.classList.remove("open");
  });
  menu.addEventListener("click", e => {
    const item = e.target.closest("[data-exp]");
    if (item){ menu.classList.remove("open"); location.hash = "#exp=" + item.dataset.exp; }
  });
  /* opciones del menú de usuario que navegan a una vista */
  uMenu.addEventListener("click", e => {
    const item = e.target.closest("[data-v]");
    if (item){ uMenu.classList.remove("open"); location.hash = "#" + item.dataset.v; }
  });
  updateClock();
  setInterval(updateClock, 30000);
}

window.addEventListener("hashchange", () => { EXP_MODAL = null; render(); });
window.addEventListener("storage", render);
document.addEventListener("DOMContentLoaded", () => { initTopbar(); render(); });
</script>
