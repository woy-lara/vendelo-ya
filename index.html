<!-- CTA fijo en móvil: aparece al pasar la portada -->
<a class="cta-sticky" href="registro.html" id="ctaSticky">
  <span data-i="nav.vender"></span>
  <svg class="ic"><use href="#i-arrow"/></svg>
</a>

<script src="shared.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  /* videos (portada + revisado): garantizar reproducción en loop aunque el
     navegador ignore el autoplay (muteado siempre puede reproducirse por script) */
  const vids = [...document.querySelectorAll(".hero-video, .rb-video, .tl-bg")];
  const playVids = () => vids.forEach(v => { v.muted = true; const p = v.play(); if (p && p.catch) p.catch(() => {}); });
  if (vids.length){
    playVids();
    /* si una política bloquea el autoplay, reintenta al primer gesto del usuario */
    document.addEventListener("pointerdown", playVids, { once: true });
    document.addEventListener("visibilitychange", () => { if (!document.hidden) playVids(); });
  }

  /* header: transparente sobre el hero, sólido al hacer scroll */
  const hd = document.querySelector(".hd-transparent");
  if (hd){
    const onScroll = () => hd.classList.toggle("scrolled", window.scrollY > 40);
    onScroll();
    window.addEventListener("scroll", onScroll, { passive:true });
  }

  /* CTA fijo en móvil: aparece al dejar atrás la portada, se oculta en el CTA final
     (para no tapar el botón principal de esa sección) */
  const sticky = document.getElementById("ctaSticky");
  if (sticky){
    const fold = document.querySelector(".hero-fold");
    const last = document.getElementById("contacto");
    const onCta = () => {
      const past = window.scrollY > (fold ? fold.offsetHeight * .85 : 500);
      const atEnd = last && last.getBoundingClientRect().top < window.innerHeight;
      sticky.classList.toggle("show", past && !atEnd);
    };
    onCta();
    window.addEventListener("scroll", onCta, { passive:true });
    window.addEventListener("resize", onCta);
  }

  /* marquee de marcas (duplicado para loop continuo) */
  const list = VY_BRANDS.filter(b => b !== "Otro");
  const seq = list.map((b,i) => i % 4 === 3 ? `<b>${b}</b>` : `<span>${b}</span>`).join("");
  document.getElementById("mq").innerHTML = seq + seq;

  /* timeline demo (etapa activa: revisado realizado) */
  function renderTl(){
    const now = 5;
    document.getElementById("tlDemo").innerHTML =
      Array.from({length:9}, (_,i) => i+1).map(n => {
        const cls = n < now ? "done" : n === now ? "now" : "future";
        const icon = n < now ? '<svg class="ic"><use href="#i-check"/></svg>' : "";
        const meta = n === 4 ? `<span class="meta"><svg class="ic" style="width:13px;height:13px"><use href="#i-pin"/></svg>${t("app.cita")}</span>` : "";
        return `<div class="tl-item ${cls}">
          <span class="tl-dot">${icon}</span>
          <h4>${t("st."+n)}</h4>
          <p>${t("st."+n+"d")}</p>
          ${meta}
        </div>`;
      }).join("");
  }
  renderTl();
  document.addEventListener("vy:lang", renderTl);
});
</script>
